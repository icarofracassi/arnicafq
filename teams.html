{% extends "layout.html" %}

{% block title %}
    Database Schema
{% endblock %}

{% block main %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; font-family: 'JetBrains Mono', monospace; color: #e0e0f0; min-height: 100vh; overflow-x: auto; }
  header { text-align: center; padding: 40px 20px 20px; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; }
  header p { font-size: 0.7rem; color: #555; letter-spacing: 0.2em; margin-top: 6px; text-transform: uppercase; }
  .canvas-wrap { width: 100%; overflow: auto; padding: 20px 20px 60px; }
  svg { display: block; margin: 0 auto; }
  .table-header { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; fill: #0a0a0f; }
  .col-name { font-size: 11px; fill: #c8c8e8; }
  .col-type { font-size: 10px; fill: #555577; }
  .col-pk { font-size: 9px; fill: #ffd700; font-weight: 700; }
  .col-fk { font-size: 9px; fill: #7eb8f7; font-weight: 700; }
  .col-odd { fill: #12121e; }
  .col-even { fill: #0e0e1a; }
  .fk-line { fill: none; stroke-width: 1.5; stroke-dasharray: 5 3; opacity: 0.45; }
  .legend text { font-size: 10px; fill: #555; letter-spacing: 0.05em; }
</style>
</head>
