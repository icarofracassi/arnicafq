{% extends "layout.html" %}
{% from "_macros.html" import game_header, game_steps %}

{% block title %}New Game{% endblock %}

{% block main %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        <!-- Step indicator -->
        {{ game_header(None) }}
        {{ game_steps(1, None) }}

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <i class="bi bi-plus-circle"></i> New Game
            </div>
            <div class="card-body">
                <form action="/games/register" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="title">Title</label>
                        <input autofocus
                               class="form-control"
                               id="title"
                               name="title"
                               placeholder="e.g. Arnica vs Los Primos"
                               required
                               type="text">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="date">Date</label>
                            <input class="form-control"
                                   id="date"
                                   name="date"
                                   required
                                   type="date">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="location_id">Location</label>
                            <select class="form-select" id="location_id" name="location_id" required>
                                <option value="" disabled selected>Select location...</option>
                                {% for loc in locations %}
                                    <option value="{{ loc.id }}">{{ loc.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="youtube_url">
                            YouTube URL <span class="text-muted fw-normal">(optional)</span>
                        </label>
                        <input class="form-control"
                               id="youtube_url"
                               name="youtube_url"
                               placeholder="https://www.youtube.com/watch?v=..."
                               type="url">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="video_start">
                                Video Start <span class="text-muted fw-normal">(optional)</span>
                            </label>
                            <input class="form-control font-monospace"
                                   id="video_start"
                                   name="video_start"
                                   pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                                   placeholder="00:00:00"
                                   type="text">
                            <div class="form-text">Format: HH:MM:SS</div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="video_end">
                                Video End <span class="text-muted fw-normal">(optional)</span>
                            </label>
                            <input class="form-control font-monospace"
                                   id="video_end"
                                   name="video_end"
                                   pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                                   placeholder="00:00:00"
                                   type="text">
                            <div class="form-text">Format: HH:MM:SS</div>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-danger" type="submit">
                            Next: Attendance <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
