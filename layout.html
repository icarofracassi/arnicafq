{% extends "layout.html" %}
{% from "_macros.html" import game_header, game_steps %}

{% block title %}Edit – {{ game.title }}{% endblock %}

{% block main %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        {{ game_header(game) }}
        {{ game_steps(1, game.id, done=steps_done) }}

        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span><i class="bi bi-pencil"></i> Edit Game</span>
                <a href="/games/{{ game.id }}" class="text-muted small text-decoration-none">
                    <i class="bi bi-eye"></i> View game
                </a>
            </div>
            <div class="card-body">
                <form action="/games/{{ game.id }}/edit" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="title">Title</label>
                        <input autofocus
                               class="form-control"
                               id="title"
                               name="title"
                               required
                               type="text"
                               value="{{ game.title }}">
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="date">Date</label>
                            <input class="form-control"
                                   id="date"
                                   name="date"
                                   required
                                   type="date"
                                   value="{{ game.date }}">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="location_id">Location</label>
                            <select class="form-select" id="location_id" name="location_id" required>
                                {% for loc in locations %}
                                    <option value="{{ loc.id }}"
                                        {% if loc.id == game.location_id %}selected{% endif %}>
                                        {{ loc.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="youtube_url">
                            YouTube URL <span class="text-muted fw-normal">(optional)</span>
                        </label>
                        <input class="form-control"
                               id="youtube_url"
                               name="youtube_url"
                               type="url"
                               value="{{ game.youtube_url or '' }}">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="video_start">
                                Video Start <span class="text-muted fw-normal">(optional)</span>
                            </label>
                            <input class="form-control font-monospace"
                                   id="video_start"
                                   name="video_start"
                                   pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                                   placeholder="00:00:00"
                                   type="text"
                                   value="{{ game.video_start or '' }}">
                            <div class="form-text">Format: HH:MM:SS</div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold" for="video_end">
                                Video End <span class="text-muted fw-normal">(optional)</span>
                            </label>
                            <input class="form-control font-monospace"
                                   id="video_end"
                                   name="video_end"
                                   pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                                   placeholder="00:00:00"
                                   type="text"
                                   value="{{ game.video_end or '' }}">
                            <div class="form-text">Format: HH:MM:SS</div>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-danger" type="submit">
                            Save Changes
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
